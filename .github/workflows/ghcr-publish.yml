name: Build and Publish to GHCR

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or SHA to build (default: current branch)'
        required: false
        default: ''
      image_tag:
        description: 'Extra tag to apply to the image (e.g. latest, v0.29.0)'
        required: false
        default: 'latest'
  workflow_call:
    inputs:
      ref:
        description: 'Tag ref to build (e.g. v0.30.0)'
        type: string
        required: true
      image_tag:
        description: 'Extra tag to apply to the image'
        type: string
        required: false
        default: 'latest'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # Lowercased at push time via docker/metadata-action
  IMAGE_NAME: ${{ github.repository_owner }}/dokploy
  MONITORING_IMAGE_NAME: ${{ github.repository_owner }}/dokploy-monitoring
  SCHEDULE_IMAGE_NAME: ${{ github.repository_owner }}/dokploy-schedule

jobs:
  build-amd64:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare env files (required by Dockerfile)
        run: |
          cp apps/dokploy/.env.production.example .env.production
          cp apps/dokploy/.env.production.example apps/dokploy/.env.production

      - name: Compute version/tag
        id: meta
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REF="${{ inputs.ref != '' && inputs.ref || github.ref }}"
          if [[ "$REF" == refs/tags/v* ]]; then
            VERSION="${REF#refs/tags/v}"
          elif [[ "$REF" == v*.*.* ]]; then
            VERSION="${REF#v}"
          else
            VERSION=$(node -p "require('./apps/dokploy/package.json').version")
          fi
          {
            echo "owner_lc=$OWNER_LC"
            echo "version=$VERSION"
            echo "image_amd=${{ env.REGISTRY }}/$OWNER_LC/dokploy:${VERSION}-amd64"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push (amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.image_amd }}
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64

  build-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare env files (required by Dockerfile)
        run: |
          cp apps/dokploy/.env.production.example .env.production
          cp apps/dokploy/.env.production.example apps/dokploy/.env.production

      - name: Compute version/tag
        id: meta
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REF="${{ inputs.ref != '' && inputs.ref || github.ref }}"
          if [[ "$REF" == refs/tags/v* ]]; then
            VERSION="${REF#refs/tags/v}"
          elif [[ "$REF" == v*.*.* ]]; then
            VERSION="${REF#v}"
          else
            VERSION=$(node -p "require('./apps/dokploy/package.json').version")
          fi
          {
            echo "owner_lc=$OWNER_LC"
            echo "version=$VERSION"
            echo "image_arm=${{ env.REGISTRY }}/$OWNER_LC/dokploy:${VERSION}-arm64"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push (arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.image_arm }}
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64

  build-monitoring-amd64:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version/tag
        id: meta
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REF="${{ inputs.ref != '' && inputs.ref || github.ref }}"
          if [[ "$REF" == refs/tags/v* ]]; then
            VERSION="${REF#refs/tags/v}"
          elif [[ "$REF" == v*.*.* ]]; then
            VERSION="${REF#v}"
          else
            VERSION=$(node -p "require('./apps/dokploy/package.json').version")
          fi
          {
            echo "owner_lc=$OWNER_LC"
            echo "version=$VERSION"
            echo "image_amd=${{ env.REGISTRY }}/$OWNER_LC/dokploy-monitoring:${VERSION}-amd64"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push monitoring (amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.monitoring
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.image_amd }}
          cache-from: type=gha,scope=monitoring-amd64
          cache-to: type=gha,mode=max,scope=monitoring-amd64

  build-monitoring-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version/tag
        id: meta
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REF="${{ inputs.ref != '' && inputs.ref || github.ref }}"
          if [[ "$REF" == refs/tags/v* ]]; then
            VERSION="${REF#refs/tags/v}"
          elif [[ "$REF" == v*.*.* ]]; then
            VERSION="${REF#v}"
          else
            VERSION=$(node -p "require('./apps/dokploy/package.json').version")
          fi
          {
            echo "owner_lc=$OWNER_LC"
            echo "version=$VERSION"
            echo "image_arm=${{ env.REGISTRY }}/$OWNER_LC/dokploy-monitoring:${VERSION}-arm64"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push monitoring (arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.monitoring
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.image_arm }}
          cache-from: type=gha,scope=monitoring-arm64
          cache-to: type=gha,mode=max,scope=monitoring-arm64

  build-schedule-amd64:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version/tag
        id: meta
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REF="${{ inputs.ref != '' && inputs.ref || github.ref }}"
          if [[ "$REF" == refs/tags/v* ]]; then
            VERSION="${REF#refs/tags/v}"
          elif [[ "$REF" == v*.*.* ]]; then
            VERSION="${REF#v}"
          else
            VERSION=$(node -p "require('./apps/dokploy/package.json').version")
          fi
          {
            echo "owner_lc=$OWNER_LC"
            echo "version=$VERSION"
            echo "image_amd=${{ env.REGISTRY }}/$OWNER_LC/dokploy-schedule:${VERSION}-amd64"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push schedule (amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.schedule
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.image_amd }}
          cache-from: type=gha,scope=schedule-amd64
          cache-to: type=gha,mode=max,scope=schedule-amd64

  build-schedule-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version/tag
        id: meta
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REF="${{ inputs.ref != '' && inputs.ref || github.ref }}"
          if [[ "$REF" == refs/tags/v* ]]; then
            VERSION="${REF#refs/tags/v}"
          elif [[ "$REF" == v*.*.* ]]; then
            VERSION="${REF#v}"
          else
            VERSION=$(node -p "require('./apps/dokploy/package.json').version")
          fi
          {
            echo "owner_lc=$OWNER_LC"
            echo "version=$VERSION"
            echo "image_arm=${{ env.REGISTRY }}/$OWNER_LC/dokploy-schedule:${VERSION}-arm64"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push schedule (arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.schedule
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.image_arm }}
          cache-from: type=gha,scope=schedule-arm64
          cache-to: type=gha,mode=max,scope=schedule-arm64

  combine-manifests:
    needs:
      - build-amd64
      - build-arm64
      - build-monitoring-amd64
      - build-monitoring-arm64
      - build-schedule-amd64
      - build-schedule-arm64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version
        id: v
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REF="${{ inputs.ref != '' && inputs.ref || github.ref }}"
          IS_RELEASE=false
          if [[ "$REF" == refs/tags/v* ]]; then
            VERSION="${REF#refs/tags/v}"
            IS_RELEASE=true
          elif [[ "$REF" == v*.*.* ]]; then
            VERSION="${REF#v}"
            IS_RELEASE=true
          else
            VERSION=$(node -p "require('./apps/dokploy/package.json').version")
          fi
          {
            echo "owner_lc=$OWNER_LC"
            echo "version=$VERSION"
            echo "is_release=$IS_RELEASE"
          } >> "$GITHUB_OUTPUT"

      - name: Create multi-arch manifests
        run: |
          REG="${{ env.REGISTRY }}/${{ steps.v.outputs.owner_lc }}"
          VER="${{ steps.v.outputs.version }}"
          EXTRA="${{ inputs.image_tag }}"
          IS_RELEASE="${{ steps.v.outputs.is_release }}"

          for NAME in dokploy dokploy-monitoring dokploy-schedule; do
            IMG="${REG}/${NAME}"

            # Versioned manifest
            docker buildx imagetools create -t "${IMG}:${VER}" \
              "${IMG}:${VER}-amd64" \
              "${IMG}:${VER}-arm64"

            # latest on release builds
            if [[ "$IS_RELEASE" == "true" ]]; then
              docker buildx imagetools create -t "${IMG}:latest" \
                "${IMG}:${VER}-amd64" \
                "${IMG}:${VER}-arm64"
            fi

            # Extra manual tag on workflow_dispatch / workflow_call
            if [[ -n "$EXTRA" && "$EXTRA" != "latest" ]]; then
              docker buildx imagetools create -t "${IMG}:${EXTRA}" \
                "${IMG}:${VER}-amd64" \
                "${IMG}:${VER}-arm64"
            fi
          done
